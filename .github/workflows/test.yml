name: Run Tests

# Run tests on pull requests and pushes to ensure code quality
on:
  pull_request:
    paths:
      - 'MeetingNotifier/**'
      - '.github/workflows/test.yml'

  push:
    branches-ignore:
      - main  # Main branch deployments are handled by testflight.yml

  # Allow manual triggering
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: MeetingNotifier

      - name: Install dependencies
        working-directory: MeetingNotifier
        run: bundle install

      - name: Create minimal .env file
        working-directory: MeetingNotifier
        run: |
          cat > .env << EOF
          # Minimal env for testing
          FASTLANE_USER=test@example.com
          FASTLANE_TEAM_ID=TEST123456
          FASTLANE_ITC_TEAM_ID=TEST123456
          EOF

      - name: Run pre-flight checks
        working-directory: MeetingNotifier
        run: bundle exec fastlane prep || true  # Don't fail on missing API keys for tests

      - name: Run tests
        working-directory: MeetingNotifier
        run: bundle exec fastlane test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: MeetingNotifier/fastlane/test_output

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = 'MeetingNotifier/fastlane/test_output';

            let comment = '## Test Results\n\n';

            if (context.payload.workflow_run.conclusion === 'success') {
              comment += '✅ All tests passed!';
            } else {
              comment += '❌ Some tests failed. Check the workflow logs for details.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: comment
            });
