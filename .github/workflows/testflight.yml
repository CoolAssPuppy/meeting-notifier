name: Deploy to TestFlight

# Automatically deploy to TestFlight when code is pushed to main branch
on:
  push:
    branches:
      - main
    paths:
      - 'MeetingNotifier/**'
      - '.github/workflows/testflight.yml'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: MeetingNotifier

      - name: Install dependencies
        working-directory: MeetingNotifier
        run: bundle install

      - name: Create .env file
        working-directory: MeetingNotifier
        run: |
          cat > .env << EOF
          FASTLANE_USER=${{ secrets.FASTLANE_USER }}
          FASTLANE_TEAM_ID=${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID=${{ secrets.FASTLANE_ITC_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID=${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID=${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH=fastlane/app_store_connect_api_key.p8
          FASTLANE_SKIP_2FA_UPGRADE=true
          FASTLANE_SKIP_CHANGELOG=false
          TESTFLIGHT_CHANGELOG=Automated build from commit ${{ github.sha }}
          EOF

      - name: Create App Store Connect API key
        working-directory: MeetingNotifier
        run: |
          mkdir -p fastlane
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > fastlane/app_store_connect_api_key.p8

      - name: Run pre-flight checks
        working-directory: MeetingNotifier
        run: bundle exec fastlane prep

      - name: Deploy to TestFlight
        working-directory: MeetingNotifier
        run: bundle exec fastlane beta

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: MeetingNotifier/fastlane/test_output

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Successfully deployed to TestFlight!"
          echo "Build will be available for testing in ~10 minutes"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ TestFlight deployment failed"
          echo "Check the logs above for error details"
