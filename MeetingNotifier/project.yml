name: MeetingNotifier
options:
  bundleIdPrefix: com.strategicnerds
  deploymentTarget:
    macOS: "14.0"
packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 1.6.0
targets:
  MeetingNotifier:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - MeetingNotifier
    info:
      path: MeetingNotifier/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: "2"
        CFBundleShortVersionString: "1.1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_NAME: MeetingNotifier
        PRODUCT_BUNDLE_IDENTIFIER: com.strategicnerds.meetingnotifier
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: MeetingNotifier/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: AppAuth
