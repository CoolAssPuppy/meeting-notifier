name: MeetingNotifier
options:
  bundleIdPrefix: com.strategicnerds
  deploymentTarget:
    macOS: "26.0"
packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 1.6.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  MeetingNotifier:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - MeetingNotifier
    info:
      path: MeetingNotifier/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: "9"
        CFBundleShortVersionString: "1.3.4"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSLocationUsageDescription: "MeetingNotifier needs your location to calculate travel time to meeting locations."
        NSLocationWhenInUseUsageDescription: "MeetingNotifier needs your location to calculate travel time to meeting locations."
        NSMicrophoneUsageDescription: "MeetingNotifier needs microphone access to transcribe your meetings."
        NSSpeechRecognitionUsageDescription: "MeetingNotifier uses speech recognition to transcribe your meetings into notes."
        NSScreenCaptureUsageDescription: "MeetingNotifier captures system audio to transcribe what other meeting participants say."
        LSApplicationCategoryType: "public.app-category.productivity"
        SUFeedURL: "https://coolasspuppy.com/meeting-notifier-updates"
        SUPublicEDKey: "V0ppFFCAZx+/Q+9ndF8BdFPpDdUPagRw4Bcp8rLu9Go="
        SUEnableAutomaticChecks: true
    entitlements:
      path: MeetingNotifier/MeetingNotifier.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        com.apple.security.device.audio-input: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.strategicnerds.meetingnotifier
    settings:
      base:
        PRODUCT_NAME: MeetingNotifier
        PRODUCT_BUNDLE_IDENTIFIER: com.strategicnerds.meetingnotifier
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_STRICT_CONCURRENCY: targeted
        OTHER_SWIFT_FLAGS: "-Xfrontend -disable-dynamic-actor-isolation"
        INFOPLIST_FILE: MeetingNotifier/Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetingNotifier/MeetingNotifier.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 955GSY56UT
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    dependencies:
      - package: AppAuth
      - package: Sparkle
      - sdk: AppIntents.framework

  MeetingNotifierTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - MeetingNotifierTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 955GSY56UT
    dependencies:
      - target: MeetingNotifier

schemes:
  MeetingNotifier:
    build:
      targets:
        MeetingNotifier: all
        MeetingNotifierTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MeetingNotifierTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
